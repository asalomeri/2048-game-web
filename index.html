<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="title-area">
        <h1 class="game-title">2048</h1>
        <p class="game-subtitle">Join the tiles, get to <strong>2048!</strong></p>
      </div>
      <div class="scores-area">
        <div class="score-box">
          <span class="score-label">SCORE</span>
          <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
          <span class="score-label">BEST</span>
          <span class="score-value" id="best-score">0</span>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <div class="controls">
      <p class="hint-text">Use <strong>arrow keys</strong> to move tiles. Swipe on mobile.</p>
      <button class="btn-new-game" id="new-game-btn">New Game</button>
    </div>

    <!-- Game Status Message -->
    <div class="game-message" id="game-message" aria-live="polite">
      <span id="message-text"></span>
      <button class="btn-keep-playing" id="keep-playing-btn" style="display:none;">Keep Playing</button>
      <button class="btn-try-again" id="try-again-btn" style="display:none;">Try Again</button>
    </div>

    <!-- Game Board -->
    <div class="board-container">
      <div class="board" id="board" role="grid" aria-label="2048 game board">
        <!-- 16 cells generated by JS -->
      </div>
    </div>

    <!-- Instructions -->
    <footer class="instructions">
      <p><strong>HOW TO PLAY:</strong> Use your <strong>arrow keys</strong> to move the tiles.
        Tiles with the same number <strong>merge into one</strong> when they touch.
        Add them up to reach <strong>2048!</strong></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
